name: Build

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      # Tests mock the LLM, so no API keys are needed for a green build.
      # NOTE: the lab4-broken branch is expected to FAIL here — that failing run is
      # the artifact Lab 4 teaches you to diagnose. Every other branch builds green.
      - name: Build and verify
        run: ./mvnw -B clean verify
