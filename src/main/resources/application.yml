embabel:
  models:
    # Default model used by withDefaultLlm(). Override per environment; any model your
    # configured provider exposes will do. Swap to a local model (e.g. an Ollama tag) to
    # keep data in the building — see Lab 6 and MODEL_ROUTING.md.
    default-llm: gpt-4.1-mini

    # Named LLM roles, referenced from code with withLlmByRole("<role>").
    # Lab 6 routes cheap work (extract/shortlist) to "cheapest" and synthesis
    # (research/assemble) to "best". Edit these to match what you actually have.
    llms:
      cheapest: gpt-4.1-nano
      best: gpt-4.1

  agent:
    logging:
      # Logging personality. Options at 0.5.0: default | starwars | severance | hitchhiker
      # | montypython | colossus. The Lab 4 stuck-plan demo lands brilliantly under
      # "severance" or "starwars" — same world-state evidence, impossible to ignore.
      personality: default

spring:
  application:
    name: confplanner
  shell:
    interactive:
      enabled: true
  autoconfigure:
    # Lab 3: the @SecureAgentTool annotation ships on the classpath so it compiles and is
    # available as a teaching artifact, but its web-security filter chain needs Spring MVC
    # (an MCP server). Exclude that auto-config so the no-Docker shell boots green; the labs
    # that run the MCP server re-enable it. See labs/lab3-guardrails.md.
    exclude: com.embabel.agent.autoconfigure.mcpserver.security.AgentMcpServerAutoConfiguration

---
# Mock profile: deterministic demos with no model calls and no API keys.
# Activate with --spring.profiles.active=mock (see SETUP.md).
spring:
  config:
    activate:
      on-profile: mock
embabel:
  agent:
    platform:
      test:
        mock-mode: true

---
# Observability profile (Lab 4): export traces to Zipkin. Build/run with the Maven
# `observability` profile so the OpenTelemetry + Zipkin exporter is on the classpath:
#   docker compose up -d
#   ./mvnw -Pobservability spring-boot:run -Dspring-boot.run.profiles=observability
# Then open http://127.0.0.1:9411. The default lab path needs none of this.
spring:
  config:
    activate:
      on-profile: observability
embabel:
  agent:
    platform:
      observability:
        enabled: true
        service-name: confplanner
management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://127.0.0.1:9411/api/v2/spans
